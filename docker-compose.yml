services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminsecret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadminsecret;
      echo 'Creating buckets...';
      mc mb myminio/accounting-receipt || true;
      mc mb myminio/bim-docs || true;
      mc mb myminio/matrequest-img || true;
      mc mb myminio/profile-picture || true;
      mc mb myminio/user-signature || true;
      mc mb myminio/work-attachments || true;
      echo 'Setting public download policies...';
      mc anonymous set download myminio/accounting-receipt;
      mc anonymous set download myminio/bim-docs;
      mc anonymous set download myminio/matrequest-img;
      mc anonymous set download myminio/profile-picture;
      mc anonymous set download myminio/user-signature;
      mc anonymous set download myminio/work-attachments;
      echo 'MinIO initialization complete.';
      exit 0;
      "

volumes:
  minio_data: